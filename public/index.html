<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="features/tag-filter.js" defer></script>
    <script src="features/sort.js" defer></script>
    <script src="features/recent-plays.js" defer></script>
    <script src="features/favorites.js" defer></script>
    <script src="features/upload-modal.js" defer></script>
    <script src="features/auth-ui.js" defer></script>
    <script src="features/member-nav.js" defer></script>
</head>
<body>
    <header class="header">
        <h1 class="header__title">게임소모임</h1>
        <p class="header__subtitle">팀원들이 직접 만든 게임을 즐겨보세요</p>
        <nav class="header__nav" id="member-nav" aria-label="팀원 목록">
            <!-- Member links inserted by member-nav.js -->
        </nav>
    </header>

    <main>
        <div class="search-bar" role="search">
            <label for="search-input" class="sr-only">Search games</label>
            <input type="text" id="search-input" placeholder="Search games...  (Ctrl+K for command palette)" autocomplete="off">
            <div id="sort-container" class="sort-bar"></div>
        </div>

        <div id="tag-filter-container" class="tag-filter"></div>

        <div id="recent-plays-container" class="recent-plays"></div>

        <div id="game-container">
            <div class="gallery-grid">
                <!-- Game cards are dynamically inserted here by app.js -->
            </div>
        </div>
    </main>

    <!-- Command Palette (Ctrl+K / Cmd+K) -->
    <div class="cmdk-overlay" id="cmdk-overlay">
        <div class="cmdk" role="dialog" aria-modal="true" aria-label="Command palette">
            <div class="cmdk__header">
                <svg class="cmdk__search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="cmdk__input" id="cmdk-input" placeholder="Search games..." autocomplete="off" aria-label="Search games in command palette">
                <kbd class="cmdk__kbd">ESC</kbd>
            </div>
            <div class="cmdk__list" id="cmdk-list">
                <!-- Items rendered by app.js -->
            </div>
            <div class="cmdk__footer">
                <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> Navigate</span>
                <span><kbd>Enter</kbd> Open</span>
                <span><kbd>Esc</kbd> Close</span>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Game Showcase. All rights reserved.</p>
    </footer>
</body>
</html>
