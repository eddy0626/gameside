<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임잼 - 게임소모임</title>
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="게임소모임">
    <meta property="og:title" content="게임잼 - 게임소모임">
    <meta property="og:description" content="제한된 시간 안에 주어진 테마로 게임을 만들어보세요">
    <meta name="twitter:card" content="summary">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="features/gamejam-page.js" defer></script>
    <script src="features/auth-ui.js" defer></script>
    <script src="features/member-nav.js" defer></script>
</head>
<body>
    <header class="header">
        <a href="index.html" class="header__back-link">&larr; 갤러리로</a>
        <h1 class="header__title">게임소모임</h1>
    </header>

    <main>
        <section class="gamejam" id="gamejam">
            <div class="gamejam__hero">
                <h2 class="gamejam__hero-title">게임잼</h2>
                <p class="gamejam__hero-subtitle">제한된 시간 안에 주어진 테마로 게임을 만들어보세요</p>
            </div>
            <button class="gamejam__create-btn" id="gamejam-create-btn" style="display:none;">게임잼 만들기</button>
            <div class="gamejam__list" id="gamejam-list">
                <!-- Populated by JS -->
            </div>
        </section>
    </main>

    <!-- Command Palette (Ctrl+K / Cmd+K) -->
    <div class="cmdk-overlay" id="cmdk-overlay">
        <div class="cmdk" role="dialog" aria-modal="true" aria-label="Command palette">
            <div class="cmdk__header">
                <svg class="cmdk__search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="cmdk__input" id="cmdk-input" placeholder="Search games..." autocomplete="off" aria-label="Search games in command palette">
                <kbd class="cmdk__kbd">ESC</kbd>
            </div>
            <div class="cmdk__list" id="cmdk-list">
                <!-- Items rendered by app.js -->
            </div>
            <div class="cmdk__footer">
                <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> Navigate</span>
                <span><kbd>Enter</kbd> Open</span>
                <span><kbd>Esc</kbd> Close</span>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Game Showcase. All rights reserved.</p>
    </footer>
</body>
</html>
