<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" rx="8" fill="#0b0c10"/>
  <!-- Stars -->
  <circle cx="20" cy="20" r="1.5" fill="#c5c6c7" opacity="0.6"/>
  <circle cx="80" cy="35" r="1" fill="#c5c6c7" opacity="0.5"/>
  <circle cx="150" cy="15" r="1.5" fill="#c5c6c7" opacity="0.7"/>
  <circle cx="170" cy="55" r="1" fill="#c5c6c7" opacity="0.4"/>
  <circle cx="40" cy="70" r="1" fill="#c5c6c7" opacity="0.5"/>
  <circle cx="120" cy="90" r="1.5" fill="#c5c6c7" opacity="0.6"/>
  <!-- Ship -->
  <polygon points="100,60 85,90 115,90" fill="#45a29e"/>
  <rect x="97" y="90" width="6" height="8" fill="#66fcf1"/>
  <!-- Bullets -->
  <rect x="98" y="40" width="4" height="10" fill="#66fcf1"/>
  <rect x="98" y="20" width="4" height="10" fill="#66fcf1" opacity="0.5"/>
  <!-- Enemy -->
  <rect x="80" y="10" width="20" height="16" rx="2" fill="#c5c6c7"/>
  <rect x="84" y="16" width="5" height="4" fill="#fc3d3d"/>
  <rect x="91" y="16" width="5" height="4" fill="#fc3d3d"/>
  <!-- Title -->
  <text x="100" y="140" text-anchor="middle" fill="#66fcf1" font-family="monospace" font-size="10">Space Shooter</text>
</svg>
