<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #0b0c10; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #0b0c10; border: 2px solid #1f2833; }
    </style>
</head>
<body>
    <canvas id="game" width="600" height="500"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const keys = {};
        const gameKeys = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '];
        document.addEventListener('keydown', e => { keys[e.key] = true; if (gameKeys.includes(e.key)) e.preventDefault(); });
        document.addEventListener('keyup', e => { keys[e.key] = false; if (gameKeys.includes(e.key)) e.preventDefault(); });

        const ship = { x: 270, y: 440, w: 30, h: 20, speed: 5 };
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        let score = 0;
        let gameOver = false;
        let shootCooldown = 0;
        let spawnTimer = 0;

        // Generate stars
        for (let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 1 + 0.3
            });
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * (canvas.width - 30),
                y: -30,
                w: 28, h: 24,
                speed: Math.random() * 2 + 1,
                hp: 1
            });
        }

        function addParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 30,
                    color
                });
            }
        }

        function update() {
            if (gameOver) {
                if (keys[' ']) {
                    score = 0; gameOver = false;
                    enemies = []; bullets = []; particles = [];
                    ship.x = 270; ship.y = 440;
                }
                return;
            }

            // Ship movement
            if (keys['ArrowLeft'] && ship.x > 0) ship.x -= ship.speed;
            if (keys['ArrowRight'] && ship.x + ship.w < canvas.width) ship.x += ship.speed;
            if (keys['ArrowUp'] && ship.y > 0) ship.y -= ship.speed;
            if (keys['ArrowDown'] && ship.y + ship.h < canvas.height) ship.y += ship.speed;

            // Shoot
            shootCooldown--;
            if (keys[' '] && shootCooldown <= 0) {
                bullets.push({ x: ship.x + ship.w / 2 - 2, y: ship.y, w: 4, h: 10 });
                shootCooldown = 12;
            }

            // Update bullets
            bullets = bullets.filter(b => {
                b.y -= 7;
                return b.y > -10;
            });

            // Spawn enemies
            spawnTimer++;
            if (spawnTimer > 40) {
                spawnEnemy();
                spawnTimer = 0;
            }

            // Update enemies
            enemies = enemies.filter(e => {
                e.y += e.speed;
                // Hit ship?
                if (e.x < ship.x + ship.w && e.x + e.w > ship.x &&
                    e.y < ship.y + ship.h && e.y + e.h > ship.y) {
                    gameOver = true;
                    addParticles(ship.x + ship.w / 2, ship.y + ship.h / 2, '#45a29e', 20);
                }
                return e.y < canvas.height + 30 && e.hp > 0;
            });

            // Bullet-enemy collision
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const b = bullets[i], e = enemies[j];
                    if (b && e && b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        e.hp--;
                        bullets.splice(i, 1);
                        if (e.hp <= 0) {
                            addParticles(e.x + e.w / 2, e.y + e.h / 2, '#c5c6c7', 10);
                            enemies.splice(j, 1);
                            score += 10;
                        }
                        break;
                    }
                }
            }

            // Stars
            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
            });

            // Particles
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.life--;
                return p.life > 0;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Stars
            stars.forEach(s => {
                ctx.fillStyle = `rgba(197,198,199,${s.size / 2.5})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });

            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            });
            ctx.globalAlpha = 1;

            if (!gameOver) {
                // Ship
                ctx.fillStyle = '#45a29e';
                ctx.beginPath();
                ctx.moveTo(ship.x + ship.w / 2, ship.y);
                ctx.lineTo(ship.x, ship.y + ship.h);
                ctx.lineTo(ship.x + ship.w, ship.y + ship.h);
                ctx.closePath();
                ctx.fill();
                // Engine glow
                ctx.fillStyle = '#66fcf1';
                ctx.fillRect(ship.x + ship.w / 2 - 3, ship.y + ship.h, 6, 5 + Math.random() * 4);
            }

            // Bullets
            ctx.fillStyle = '#66fcf1';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Enemies
            enemies.forEach(e => {
                ctx.fillStyle = '#c5c6c7';
                ctx.fillRect(e.x, e.y, e.w, e.h);
                ctx.fillStyle = '#fc3d3d';
                ctx.fillRect(e.x + 4, e.y + 8, 6, 4);
                ctx.fillRect(e.x + e.w - 10, e.y + 8, 6, 4);
            });

            // Score
            ctx.fillStyle = '#c5c6c7';
            ctx.font = '18px monospace';
            ctx.fillText('Score: ' + score, 10, 25);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#66fcf1';
                ctx.font = '32px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '16px monospace';
                ctx.fillStyle = '#c5c6c7';
                ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 15);
                ctx.fillText('Press SPACE to restart', canvas.width / 2, canvas.height / 2 + 45);
                ctx.textAlign = 'left';
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.font = '12px monospace';
                ctx.fillText('Arrows: move | Space: shoot', 10, canvas.height - 10);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
