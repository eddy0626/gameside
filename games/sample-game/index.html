<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Platformer</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #16213e; border: 2px solid #0f3460; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const GRAVITY = 0.5;
        const JUMP_FORCE = -10;
        const MOVE_SPEED = 5;
        const GROUND_Y = canvas.height - 40;

        const platforms = [
            { x: 0, y: GROUND_Y, w: canvas.width, h: 40 },
            { x: 150, y: 300, w: 120, h: 16 },
            { x: 350, y: 240, w: 120, h: 16 },
            { x: 550, y: 180, w: 120, h: 16 },
            { x: 250, y: 130, w: 120, h: 16 }
        ];

        const coins = [
            { x: 200, y: 270, size: 12, collected: false },
            { x: 400, y: 210, size: 12, collected: false },
            { x: 600, y: 150, size: 12, collected: false },
            { x: 300, y: 100, size: 12, collected: false }
        ];

        const player = {
            x: 50, y: GROUND_Y - 32,
            w: 28, h: 32,
            vx: 0, vy: 0,
            onGround: false,
            score: 0
        };

        const keys = {};
        const gameKeys = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '];
        document.addEventListener('keydown', e => { keys[e.key] = true; if (gameKeys.includes(e.key)) e.preventDefault(); });
        document.addEventListener('keyup', e => { keys[e.key] = false; if (gameKeys.includes(e.key)) e.preventDefault(); });

        function update() {
            // Horizontal movement
            player.vx = 0;
            if (keys['ArrowLeft']) player.vx = -MOVE_SPEED;
            if (keys['ArrowRight']) player.vx = MOVE_SPEED;

            // Jump
            if ((keys['ArrowUp'] || keys[' ']) && player.onGround) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
            }

            // Gravity
            player.vy += GRAVITY;

            // Move
            player.x += player.vx;
            player.y += player.vy;

            // Screen bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            // Platform collision
            player.onGround = false;
            for (const p of platforms) {
                if (player.vy >= 0 &&
                    player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.vy + 2) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.onGround = true;
                }
            }

            // Coin collection
            for (const c of coins) {
                if (!c.collected) {
                    const dx = (player.x + player.w / 2) - c.x;
                    const dy = (player.y + player.h / 2) - c.y;
                    if (Math.sqrt(dx * dx + dy * dy) < c.size + 14) {
                        c.collected = true;
                        player.score += 10;
                    }
                }
            }

            // Fall reset
            if (player.y > canvas.height + 50) {
                player.x = 50;
                player.y = GROUND_Y - player.h;
                player.vy = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Platforms
            for (const p of platforms) {
                ctx.fillStyle = '#0f3460';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#53d769';
                ctx.fillRect(p.x, p.y, p.w, 4);
            }

            // Coins
            for (const c of coins) {
                if (!c.collected) {
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffd700';
                    ctx.fill();
                    ctx.strokeStyle = '#daa520';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            // Player
            ctx.fillStyle = '#e94560';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 6, player.y + 8, 6, 6);
            ctx.fillRect(player.x + 16, player.y + 8, 6, 6);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(player.x + 8, player.y + 10, 3, 3);
            ctx.fillRect(player.x + 18, player.y + 10, 3, 3);

            // Score
            ctx.fillStyle = '#fff';
            ctx.font = '18px monospace';
            ctx.fillText('Score: ' + player.score, 10, 25);

            // Instructions
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '13px monospace';
            ctx.fillText('Arrow keys to move, Up/Space to jump', canvas.width / 2 - 160, canvas.height - 10);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
